name: Deploy Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          auto-merge: false

      - name: Create Vercel deployment
        if: github.ref == 'refs/heads/main'
        run: |
          echo "✅ Build successful!"
          echo "📝 Next: Push to main branch for Vercel auto-deployment"
          echo "🌐 Your app deploys automatically via Vercel GitHub integration"

      - name: Deploy to Vercel (Staging)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "✅ Staging build successful!"
          echo "📝 Deploy to staging via Vercel GitHub integration"

      - name: Notify deployment
        if: always()
        run: |
          if [ ${{ job.status }} = 'success' ]; then
            echo "✅ Deployment ready for Vercel"
          else
            echo "❌ Build failed"
          fi
